<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="250" height="250">

  <rect width="250" height="250" fill="#0f0f0f"/>

  <g transform="translate(125, 125)" stroke="#f2f0eb" fill="none">

    <!-- Faint guide circle -->
    <circle cx="0" cy="0" r="82" stroke-width="0.8" stroke-opacity="0.2"/>

    <!-- Arc 1: solid -->
    <path d="M -58,-58 A 82,82 0 1 1 58,58"
          stroke-width="3.2" stroke-linecap="round"/>

    <!-- Arrowhead arc 1 -->
    <g transform="translate(58,58) rotate(45)">
      <polyline points="-11,-5.5 0,0 -11,5.5"
                stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>
    </g>

    <!-- Arc 2: dashed return -->
    <path d="M 58,58 A 82,82 0 0 1 -58,-58"
          stroke-width="2" stroke-linecap="round" stroke-dasharray="4 9"/>

    <!-- Arrowhead arc 2 -->
    <g transform="translate(-58,-58) rotate(225)">
      <polyline points="-11,-5.5 0,0 -11,5.5"
                stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    </g>

    <!-- Node dots -->
    <circle cx="-58" cy="-58" r="6" fill="#f2f0eb" stroke="none"/>
    <circle cx="58"  cy="58"  r="6" fill="#f2f0eb" stroke="none"/>

  </g>

</svg>
